<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>التسجيل للراغبين في العمل</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="application-page">

        <header class="top-header">

            <!-- شعار الإسناد -->
            <div class="logo-box">

                <img
                    src="logo-right.png"
                    class="top-logo support-logo"
                    alt="Joint Support"
                >

                <div class="logo-title">
                    <span class="arabic-title">الإسناد المشترك</span>
                    <span class="english-title">JOINT SUPPORT</span>
                </div>

            </div>

            <!-- العنوان -->
            <div class="header-content">

                <h1>انضم إلينا</h1>

                <p>التسجيل للراغبين في العمل</p>

            </div>

            <!-- شعار وزارة الدفاع -->
            <div class="logo-box">

                <img
                    src="logo-left.png"
                    class="top-logo ministry-logo"
                    alt="Ministry of Defence"
                >

                <div class="logo-title">
                    <span class="arabic-title">وزارة الدفاع</span>
                    <span class="english-title">MINISTRY OF DEFENCE</span>
                </div>

            </div>

        </header>

        <section class="intro-section">

            <h2>شروط التقديم</h2>

            <ul>
                <li>أن يكون المتقدم من مواطني الدولة</li>
                <li>أن يكون لائقاً طبياً</li>
                <li>إدخال جميع البيانات بصورة صحيحة</li>
            </ul>

        </section>

        <section class="form-card">

            <form id="registrationForm">

                <div class="form-group">

                    <label for="fullName">
                        الاسم الثلاثي *
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">👤</span>

                        <input
                            type="text"
                            id="fullName"
                            name="fullName"
                            placeholder="أدخل الاسم الثلاثي"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label for="phone">
                        رقم الهاتف *
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">☎</span>

                        <input
                            type="tel"
                            id="phone"
                            name="phone"
                            placeholder="05XXXXXXXX"
                            pattern="05[0-9]{8}"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label for="emiratesId">
                        رقم الهوية الإماراتية *
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">▣</span>

                        <input
                            type="text"
                            id="emiratesId"
                            name="emiratesId"
                            placeholder="784-XXXX-XXXXXXX-X"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label for="age">
                        العمر *
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">#</span>

                        <input
                            type="number"
                            id="age"
                            name="age"
                            min="18"
                            max="65"
                            placeholder="أدخل العمر"
                            required
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label for="emirate">
                        الإمارة
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">⌖</span>

                        <select
                            id="emirate"
                            name="emirate"
                        >
                            <option value="">اختر الإمارة</option>
                            <option value="أبوظبي">أبوظبي</option>
                            <option value="دبي">دبي</option>
                            <option value="الشارقة">الشارقة</option>
                            <option value="عجمان">عجمان</option>
                            <option value="أم القيوين">أم القيوين</option>
                            <option value="رأس الخيمة">رأس الخيمة</option>
                            <option value="الفجيرة">الفجيرة</option>
                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label for="medicalGrade">
                        الدرجة الطبية
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">✚</span>

                        <select
                            id="medicalGrade"
                            name="medicalGrade"
                        >
                            <option value="">اختر الدرجة الطبية</option>
                            <option value="1">الدرجة الأولى</option>
                            <option value="2">الدرجة الثانية</option>
                            <option value="3">الدرجة الثالثة</option>
                            <option value="4">الدرجة الرابعة</option>
                            <option value="5">الدرجة الخامسة</option>
                            <option value="6">الدرجة السادسة</option>
                            <option value="لا ينطبق">لا ينطبق</option>
                        </select>

                    </div>

                </div>

                <div class="form-group">

                    <label for="qualification">
                        المؤهل العلمي
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">▤</span>

                        <input
                            type="text"
                            id="qualification"
                            name="qualification"
                            placeholder="أدخل المؤهل العلمي"
                        >

                    </div>

                </div>

                <div class="form-group">

                    <label for="desiredJob">
                        الوظيفة المرغوبة
                    </label>

                    <div class="input-wrapper">

                        <span class="field-icon">⚙</span>

                        <select
                            id="desiredJob"
                            name="desiredJob"
                        >
                            <option value="">اختر الوظيفة المرغوبة</option>
                            <option value="مسعف">مسعف</option>
                            <option value="ممرض">ممرض</option>
                            <option value="طبيب">طبيب</option>
                            <option value="مأمور إشارة">مأمور إشارة</option>
                            <option value="فني ميكانيكي">فني ميكانيكي</option>
                            <option value="فني كهربائي">فني كهربائي</option>
                            <option value="سائق">سائق</option>
                            <option value="خازن فني">خازن فني</option>
                            <option value="فني إلكترونيات">فني إلكترونيات</option>
                            <option value="فني شبكات بصرية">
                                فني شبكات بصرية
                            </option>
                        </select>

                    </div>

                </div>

                <div class="agreement-box">

                    <h3 class="agreement-title">
                        شروط الانضمام
                    </h3>

                    <label class="checkbox-row">

                        <input
                            type="checkbox"
                            id="agreement"
                            name="agreement"
                            required
                        >

                        <span>
                            أقر بأن جميع البيانات المدخلة صحيحة، وأوافق على
                            شروط التقديم المذكورة أعلاه.
                        </span>

                    </label>

                </div>

                <button
                    type="submit"
                    class="submit-button"
                >
                    إرسال الطلب
                </button>

            </form>

        </section>

    </main>

    <script src="script.js"></script>

</body>

</html>
